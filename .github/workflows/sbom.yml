name: SBOM

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sbom:
    uses: sirosfoundation/.github/.github/workflows/sbom.yml@03160e376dbdeb9f2c904e7a9f45499b2f67e8fa # main
    with:
      artifact-name: wmp-js
      scan-vulnerabilities: true
      sign-sbom: false
    permissions:
      contents: write
      id-token: write
      security-events: write
